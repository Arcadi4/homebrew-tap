name: Update pi-mono cask

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7,22 * * *"

permissions:
  contents: write

jobs:
  update-cask:
    runs-on: ubuntu-latest

    steps:
      - name: Check out tap
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Fetch latest release metadata
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: badlogic/pi-mono
        run: |
          set -euo pipefail

          gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${REPO}/releases" > releases.json

          release_json="$(
            jq -cer '
              map(
                select(.draft == false)
                | select(
                    ([.assets[]?.name] | index("pi-darwin-arm64.tar.gz")) and
                    ([.assets[]?.name] | index("pi-darwin-x64.tar.gz"))
                  )
              )
              | first
            ' releases.json
          )"

          if [ -z "$release_json" ] || [ "$release_json" = "null" ]; then
            echo "No eligible release with both Darwin tarballs found."
            exit 1
          fi

          tag="$(jq -r '.tag_name' <<<"$release_json")"
          version="${tag#v}"

          asset_digest() {
            local asset_name="$1"
            local digest

            digest="$(
              jq -r --arg asset_name "$asset_name" '
                .assets[]
                | select(.name == $asset_name)
                | .digest // empty
              ' <<<"$release_json"
            )"

            if [ -z "$digest" ]; then
              echo "Release asset digest is missing for ${asset_name}." >&2
              exit 1
            fi

            if [[ "$digest" != sha256:* ]]; then
              echo "Unexpected digest format for ${asset_name}: ${digest}" >&2
              exit 1
            fi

            printf '%s\n' "${digest#sha256:}"
          }

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "sha256_arm=$(asset_digest "pi-darwin-arm64.tar.gz")"
            echo "sha256_intel=$(asset_digest "pi-darwin-x64.tar.gz")"
          } >> "$GITHUB_OUTPUT"

      - name: Update cask file
        env:
          VERSION: ${{ steps.release.outputs.version }}
          SHA256_ARM: ${{ steps.release.outputs.sha256_arm }}
          SHA256_INTEL: ${{ steps.release.outputs.sha256_intel }}
          CASK_FILE: Casks/pi-mono.rb
        run: |
          set -euo pipefail

          ruby <<'RUBY'
          file = ENV.fetch("CASK_FILE")
          version = ENV.fetch("VERSION")
          sha256_arm = ENV.fetch("SHA256_ARM")
          sha256_intel = ENV.fetch("SHA256_INTEL")

          text = File.read(file)

          def replace!(text, pattern, replacement, description)
            text.sub!(pattern, replacement) || abort("Could not update #{description} in cask file.")
          end

          replace!(
            text,
            /^\s*version\s+"[^"]+"$/,
            %(  version "#{version}"),
            "version"
          )

          replace!(
            text,
            /^\s*on_arm do\n\s*sha256\s+"[0-9a-f]+"\n\n\s*url\s+"https:\/\/github\.com\/badlogic\/pi-mono\/releases\/download\/v#\{version\}\/pi-darwin-arm64\.tar\.gz"\n\s*end$/,
            %(  on_arm do\n    sha256 "#{sha256_arm}"\n\n    url "https://github.com/badlogic/pi-mono/releases/download/v\#{version}/pi-darwin-arm64.tar.gz"\n  end),
            "arm64 checksum"
          )

          replace!(
            text,
            /^\s*on_intel do\n\s*sha256\s+"[0-9a-f]+"\n\n\s*url\s+"https:\/\/github\.com\/badlogic\/pi-mono\/releases\/download\/v#\{version\}\/pi-darwin-x64\.tar\.gz"\n\s*end$/,
            %(  on_intel do\n    sha256 "#{sha256_intel}"\n\n    url "https://github.com/badlogic/pi-mono/releases/download/v\#{version}/pi-darwin-x64.tar.gz"\n  end),
            "x64 checksum"
          )

          File.write(file, text)
          RUBY

      - name: Audit cask
        run: |
          brew audit --cask --new --no-signing arcadi4/tap/pi-mono

      - name: Check for changes
        id: changes
        run: |
          set -euo pipefail
          if git diff --quiet -- Casks/pi-mono.rb; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff -- Casks/pi-mono.rb
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/pi-mono.rb
          git commit -m "Bump pi-mono to ${VERSION}"
          git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
